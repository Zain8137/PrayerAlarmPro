name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libltdl-dev \
            libsqlite3-dev \
            libbz2-dev \
            libreadline-dev \
            libjpeg-dev \
            libpng-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3"
          pip install "buildozer<1.6"

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PrayerAlarmPro-APK
          path: bin/*.apk